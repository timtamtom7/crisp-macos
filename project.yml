name: CrispMac
options:
  bundleIdPrefix: com.crisp
  deploymentTarget:
    macOS: "15.0"

targets:
  CrispMac:
    type: application
    platform: macOS
    sources:
      - path: CrispMac/Sources
      - path: CrispMac/Services
      - path: Crisp/Sources/Models
      - path: Crisp/Sources/Services
      - path: Crisp/Sources/ViewModels
      - path: Crisp/Sources/Views/Components
      - path: Crisp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crisp.macos
        MARKETING_VERSION: "1.0.0"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: AppKit.framework
      - sdk: AVFoundation.framework
      - sdk: Speech.framework
      - sdk: NaturalLanguage.framework

name: Crisp
options:
  bundleIdPrefix: com.crisp
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  Crisp:
    type: application
    platform: iOS
    sources:
      - path: Crisp/Sources/Models
      - path: Crisp/Sources/Services
      - path: Crisp/Sources/Views/Components
      - path: Crisp/Resources
      - path: Crisp/Sources/Views
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crisp.ios
        MARKETING_VERSION: "1.0.0"
        INFOPLIST_FILE: Crisp/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ENABLE_PREVIEWS: YES
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: AVFoundation.framework
      - sdk: Speech.framework
      - sdk: NaturalLanguage.framework
